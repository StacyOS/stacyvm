server:
  host: "0.0.0.0"
  port: 7423
  preview_domain: "localhost"

providers:
  default: "docker"

  docker:
    enabled: true
    socket: "unix:///var/run/docker.sock"
    runtime: "runc"
    default_image: "alpine:latest"
    network_mode: "stacyvm-network"
    seccomp_profile: "default"
    read_only_rootfs: false
    memory: "512m"
    cpus: "1"
    pids_limit: 256
    dropped_caps: ["ALL"]
    added_caps: []
    pool_security:
      per_user_uid: false
      pid_namespace: false
      workspace_permissions: true
      hidepid: false

  firecracker:
    enabled: false
    firecracker_path: "/usr/local/bin/firecracker"
    kernel_path: "/var/lib/stacyvm/vmlinux.bin"
    agent_path: "/usr/local/bin/stacyvm-agent"
    data_dir: "/var/lib/stacyvm"

  e2b:
    enabled: false
    api_key: ""
    base_url: "https://api.e2b.dev"

  custom:
    enabled: false
    name: "custom"
    base_url: ""
    api_key: ""
    timeout: "60s"

  proot:
    enabled: false
    rootfs_path: "/var/lib/stacyvm/rootfs"
    proot_binary: "proot"
    workspace_base: "/var/lib/stacyvm/workspaces"
    default_timeout: "60s"
    max_sandboxes: 10
    max_memory_mb: 512
    max_disk_mb: 1024
    languages: ["python3", "node", "bash"]

defaults:
  ttl: "30m"
  image: "alpine:latest"
  memory_mb: 1024
  vcpus: 1
  disk_size_mb: 1024
  max_ttl: "24h"
  default_exec_timeout: "30s"
  max_exec_timeout: "10m"
  max_sandboxes: 100
  max_sandboxes_per_owner: 10
  spawn_overflow: "queue"
  spawn_queue_timeout: "30s"
  max_spawn_queue: 100

auth:
  enabled: true
  api_key: "change-me-generate-at-least-32-bytes"

rate_limit:
  enabled: true
  requests_per_minute: 120
  burst: 60
  key_by: "api_key"
  bucket_ttl: "15m"
  cleanup_interval: "1m"

database:
  path: "/var/lib/stacyvm/stacyvm.db"

logging:
  level: "info"
  format: "json"

pool:
  enabled: false
  max_vms: 10
  max_users_per_vm: 5
  image: "alpine:latest"
  memory_mb: 2048
  vcpus: 2
  overflow: "reject"
