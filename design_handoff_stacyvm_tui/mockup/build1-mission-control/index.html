<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StacyVM TUI — Wireframe Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#08080a;
    --panel:#0c0c10;
    --panel-2:#101016;
    --ink:#ECE7DD;
    --dim:#7d7d86;
    --faint:#4a4a52;
    --line:#23232b;
    --line-2:#33333d;
    --orange:#FFA60C;
    --orange-2:#FF7A1A;
    --green:#22C55E;
    --red:#FF4747;
    --mint:#D7F6E2;
    --steel:#5b6b78;
    --note:#E9C893;
    --grid:rgba(120,130,150,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    background-image:
      radial-gradient(1200px 700px at 70% -10%, rgba(255,166,12,0.06), transparent 60%),
      radial-gradient(900px 600px at 0% 110%, rgba(91,107,120,0.07), transparent 55%),
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:auto,auto,26px 26px,26px 26px;
    -webkit-font-smoothing:antialiased;
  }
  .hand{font-family:'Kalam',cursive;}
  ::selection{background:rgba(255,166,12,0.3);}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;gap:18px;
    padding:14px 26px;
    background:linear-gradient(180deg, rgba(8,8,10,0.96), rgba(8,8,10,0.82));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .brandmark{color:var(--orange);font-size:7px;line-height:7px;letter-spacing:0;white-space:pre;filter:drop-shadow(0 0 6px rgba(255,166,12,0.35));}
  .brandwrap{display:flex;align-items:center;gap:14px;}
  .brandtxt b{font-weight:700;letter-spacing:3px;font-size:14px;}
  .brandtxt span{display:block;color:var(--dim);font-size:10px;letter-spacing:2.5px;margin-top:2px;}
  .topspacer{flex:1;}
  .toggles{display:flex;gap:8px;align-items:center;}
  .tg{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.5px;
    color:var(--dim);background:transparent;border:1px solid var(--line-2);
    padding:7px 12px;border-radius:2px;cursor:pointer;display:flex;align-items:center;gap:7px;
    transition:all .15s;
  }
  .tg:hover{color:var(--ink);border-color:var(--steel);}
  .tg .led{width:7px;height:7px;border-radius:50%;background:var(--faint);box-shadow:none;transition:all .15s;}
  .tg.on{color:var(--ink);border-color:rgba(255,166,12,0.5);}
  .tg.on .led{background:var(--orange);box-shadow:0 0 8px var(--orange);}

  /* ---------- tabs ---------- */
  .tabs{
    display:flex;gap:2px;padding:0 22px;
    background:var(--bg);border-bottom:1px solid var(--line);
    position:sticky;top:65px;z-index:49;flex-wrap:wrap;
  }
  .tab{
    font-size:12px;letter-spacing:1px;color:var(--dim);
    padding:13px 16px;cursor:pointer;border:none;background:none;
    border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;
  }
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--orange);border-bottom-color:var(--orange);}
  .tab .num{color:var(--faint);margin-right:7px;}
  .tab.active .num{color:var(--orange-2);}

  /* ---------- layout ---------- */
  .wrap{max-width:1280px;margin:0 auto;padding:40px 28px 120px;}
  .secthead{margin:8px 0 30px;}
  .kicker{color:var(--orange);font-size:11px;letter-spacing:4px;text-transform:uppercase;}
  .secthead h1{font-size:40px;margin:10px 0 0;letter-spacing:-0.5px;font-weight:700;}
  .secthead h1 .hand{font-weight:400;color:var(--dim);font-size:30px;}
  .lede{color:var(--dim);font-size:14px;max-width:760px;line-height:1.7;margin-top:14px;}
  .lede b{color:var(--ink);font-weight:500;}

  /* ---------- screen panel (the TUI mock) ---------- */
  .screen{
    position:relative;background:var(--panel);border:1px solid var(--line);
    border-radius:3px;padding:0;overflow:hidden;
    box-shadow:0 30px 60px -30px rgba(0,0,0,0.8), inset 0 0 60px rgba(255,166,12,0.012);
  }
  .screen::before,.screen::after{content:"";position:absolute;width:14px;height:14px;pointer-events:none;z-index:3;}
  .screen::before{top:6px;left:6px;border-top:2px solid var(--orange);border-left:2px solid var(--orange);opacity:.7;}
  .screen::after{bottom:6px;right:6px;border-bottom:2px solid var(--orange);border-right:2px solid var(--orange);opacity:.7;}
  .scr-chrome{
    display:flex;align-items:center;gap:10px;padding:9px 14px;
    border-bottom:1px solid var(--line);background:var(--panel-2);
    font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;
  }
  .scr-dots{display:flex;gap:5px;}
  .scr-dots i{width:8px;height:8px;border-radius:50%;display:block;background:var(--line-2);}
  .scr-dots i.o{background:var(--orange);}
  .scr-body{padding:16px 18px;font-size:12.5px;line-height:1.55;}
  .crt body, .crt .screen .scr-body{}
  /* scanline overlay */
  body.crt .screen::after{}
  body.crt .scr-body{position:relative;}
  body.crt .screen{
    background-image:repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
  }

  /* text helpers */
  .dim{color:var(--dim);} .faint{color:var(--faint);} .hi{color:var(--orange);}
  .ok{color:var(--green);} .err{color:var(--red);} .mint{color:var(--mint);} .steel{color:var(--steel);}
  .b{font-weight:700;} .up{text-transform:uppercase;letter-spacing:1.5px;}
  pre{margin:0;font-family:inherit;}

  /* HUD module / panel inside a screen */
  .mod{position:relative;border:1px solid var(--line-2);border-radius:2px;padding:11px 13px;background:rgba(255,255,255,0.012);}
  .mod-t{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;}
  .mod.accent{border-color:rgba(255,166,12,0.35);box-shadow:inset 0 0 24px rgba(255,166,12,0.04);}
  .mod.accent .mod-t{color:var(--orange);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}

  /* keycaps */
  .key{display:inline-flex;align-items:center;justify-content:center;min-width:18px;padding:1px 6px;border:1px solid var(--line-2);border-bottom-width:2px;border-radius:3px;font-size:10.5px;color:var(--ink);background:var(--panel-2);}
  .keyrow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;color:var(--dim);font-size:11px;}

  /* big metric */
  .metric{font-size:34px;font-weight:700;line-height:1;letter-spacing:-1px;}
  .metric.ok{color:var(--green);} .metric.hi{color:var(--orange);}
  .metric small{font-size:11px;font-weight:400;letter-spacing:1px;}

  /* meter / spark */
  .meter{font-size:12px;letter-spacing:-0.5px;}
  .spark{letter-spacing:0;font-size:13px;}

  /* table */
  .tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
  .tbl th{text-align:left;color:var(--dim);font-weight:400;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;padding:0 10px 7px 0;border-bottom:1px solid var(--line);}
  .tbl td{padding:6px 10px 6px 0;border-bottom:1px solid rgba(35,35,43,0.5);}
  .tbl tr.sel td{background:rgba(255,166,12,0.08);color:var(--orange);}
  .tbl tr.sel td:first-child{box-shadow:inset 2px 0 0 var(--orange);}

  /* annotations */
  .notes{display:flex;flex-direction:column;gap:18px;padding-top:6px;}
  .note{font-family:'Kalam',cursive;font-size:16px;line-height:1.35;color:var(--note);position:relative;padding-left:22px;}
  .note::before{content:"";position:absolute;left:2px;top:7px;width:12px;height:12px;border-left:2px solid var(--orange);border-bottom:2px solid var(--orange);transform:rotate(-45deg);opacity:.8;}
  .note b{color:var(--orange);font-weight:700;}
  .note .tagn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--orange);text-transform:uppercase;display:block;margin-bottom:2px;}
  body.noanno .note, body.noanno .caption .hand, body.noanno .fixnote{display:none;}

  .herorow{display:grid;grid-template-columns:1fr 300px;gap:26px;align-items:start;margin-bottom:34px;}
  @media(max-width:1080px){.herorow{grid-template-columns:1fr;}}

  .caption{margin-top:10px;color:var(--dim);font-size:12px;line-height:1.5;}
  .caption .t{color:var(--ink);font-weight:500;letter-spacing:.5px;}
  .caption .hand{color:var(--note);font-size:15px;display:block;margin-top:4px;}

  .scrgrid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:14px;}
  @media(max-width:900px){.scrgrid{grid-template-columns:1fr;}}

  .moves{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 30px;}
  .move{border:1px solid var(--line-2);border-left:2px solid var(--orange);padding:10px 14px;border-radius:2px;background:rgba(255,255,255,0.012);max-width:300px;}
  .move .mt{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:4px;}
  .move .md{font-size:12px;color:var(--dim);line-height:1.5;}

  .divider{display:flex;align-items:center;gap:14px;margin:46px 0 26px;color:var(--faint);font-size:11px;letter-spacing:3px;text-transform:uppercase;}
  .divider::before{content:"";height:1px;background:var(--line);width:34px;}
  .divider::after{content:"";height:1px;background:var(--line);flex:1;}

  /* overview cards */
  .ovgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:8px;}
  @media(max-width:900px){.ovgrid{grid-template-columns:1fr;}}
  .ovcard{border:1px solid var(--line);border-radius:3px;padding:22px;background:var(--panel);position:relative;overflow:hidden;cursor:pointer;transition:all .18s;}
  .ovcard:hover{border-color:rgba(255,166,12,0.4);transform:translateY(-3px);}
  .ovcard .lt{font-size:10px;letter-spacing:2px;color:var(--orange);text-transform:uppercase;}
  .ovcard h3{font-size:21px;margin:8px 0 4px;letter-spacing:-.3px;}
  .ovcard .sub{color:var(--dim);font-size:12.5px;line-height:1.6;min-height:62px;}
  .ovcard .mini{margin-top:14px;border-top:1px solid var(--line);padding-top:13px;font-size:11px;color:var(--dim);line-height:1.7;}
  .ovcard .mini b{color:var(--ink);font-weight:500;}
  .pill{display:inline-block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--bg);background:var(--orange);padding:3px 8px;border-radius:2px;font-weight:700;}

  .problemlist{display:grid;grid-template-columns:1fr 1fr;gap:12px 30px;margin-top:18px;}
  @media(max-width:900px){.problemlist{grid-template-columns:1fr;}}
  .prob{display:flex;gap:12px;font-size:12.5px;line-height:1.5;color:var(--dim);align-items:flex-start;}
  .prob .x{color:var(--red);flex:none;}
  .prob .arrow{color:var(--faint);}
  .prob b{color:var(--ink);font-weight:500;}

  .fixnote{font-family:'Kalam',cursive;color:var(--note);font-size:15px;margin-top:5px;}

  .footer{color:var(--faint);font-size:11px;text-align:center;padding:40px 0 0;letter-spacing:1px;}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="logo-art.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="wire-kit.jsx"></script>
  <script type="text/babel" src="direction-a.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>
  <script type="text/babel" src="direction-c.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
