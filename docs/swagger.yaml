host: localhost:7423
info:
  contact: {}
  description: StacyVM microVM sandbox orchestrator API
  title: StacyVM API
  version: "1.0"
paths:
  /admin/audit:
    get:
      description: Return recent redacted admin route access records
      parameters:
      - description: Maximum number of records, capped at 500
        in: query
        name: limit
        type: integer
      - description: Actor exact match
        in: query
        name: actor
        type: string
      - description: HTTP method exact match
        in: query
        name: method
        type: string
      - description: HTTP status exact match
        in: query
        name: status
        type: integer
      - description: Path substring match
        in: query
        name: path
        type: string
      - description: 'Response format: json or csv'
        in: query
        name: format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_routes.AdminAuditResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List admin audit logs
      tags:
      - admin
  /diagnostics:
    get:
      description: Return redacted build, store, provider, sandbox, event, and operation
        diagnostics
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_routes.DiagnosticsResponse'
      security:
      - ApiKeyAuth: []
      summary: Get diagnostics
      tags:
      - system
  /events:
    get:
      description: Open an SSE stream for real-time sandbox and system events
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_orchestrator.Event'
      security:
      - ApiKeyAuth: []
      summary: Subscribe to events
      tags:
      - system
  /health:
    get:
      description: Return the health status, version, and uptime
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_routes.HealthResponse'
      security:
      - ApiKeyAuth: []
      summary: Health check
      tags:
      - system
  /live:
    get:
      description: Return whether the StacyVM API process is alive
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_routes.HealthResponse'
      security:
      - ApiKeyAuth: []
      summary: Liveness check
      tags:
      - system
  /metrics:
    get:
      description: Return runtime metrics including sandbox count, goroutines, and
        memory usage
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_routes.MetricsResponse'
      security:
      - ApiKeyAuth: []
      summary: Get metrics
      tags:
      - system
  /metrics/prometheus:
    get:
      description: Return runtime, provider, sandbox, event, and operation metrics
        in Prometheus text format
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get Prometheus metrics
      tags:
      - system
  /providers:
    get:
      description: Return all registered providers with health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_routes.ProviderInfo'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List providers
      tags:
      - providers
  /providers/{providerName}:
    get:
      description: Return detailed information about a specific provider
      parameters:
      - description: Provider name
        in: path
        name: providerName
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_routes.ProviderDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_httputil.APIError'
      security:
      - ApiKeyAuth: []
      summary: Get provider details
      tags:
      - providers
  /providers/test:
    post:
      description: Run health checks on all registered providers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - ApiKeyAuth: []
      summary: Test providers
      tags:
      - providers
  /quotas:
    get:
      description: Return all persisted owner quota overrides
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_orchestrator.OwnerQuota'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List owner quotas
      tags:
      - quotas
  /quotas/{ownerID}:
    delete:
      description: Delete the quota override for an owner
      parameters:
      - description: Owner ID
        in: path
        name: ownerID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_routes.StatusResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_httputil.APIError'
      security:
      - ApiKeyAuth: []
      summary: Delete owner quota
      tags:
      - quotas
    get:
      description: Return the persisted quota override for an owner
      parameters:
      - description: Owner ID
        in: path
        name: ownerID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_orchestrator.OwnerQuota'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_httputil.APIError'
      security:
      - ApiKeyAuth: []
      summary: Get owner quota
      tags:
      - quotas
    put:
      consumes:
      - application/json
      description: Create or update quota overrides for an owner
      parameters:
      - description: Owner ID
        in: path
        name: ownerID
        required: true
        type: string
      - description: Quota request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_orchestrator.OwnerQuota'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_orchestrator.OwnerQuota'
      security:
      - ApiKeyAuth: []
      summary: Save owner quota
      tags:
      - quotas
  /quotas/{ownerID}/usage:
    get:
      description: Return active sandbox usage and effective quota for an owner
      parameters:
      - description: Owner ID
        in: path
        name: ownerID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_StacyOs_stacyvm_internal_orchestrator.OwnerUsage'
      security:
      - ApiKeyAuth: []
      summary: Get owner quota usage
      tags:
      - quotas
  /quotas/summary:
    get:
      description: Return non-identifying counts for persisted owner quota overrides
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
